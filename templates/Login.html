{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-TodoApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="signup-container">
        <div class="signup-box">
            <form method="post">
                {% csrf_token %}
                <div class="heading">
                    <h2>Login</h2>
                </div>
                <div class="input-fields">
                    <label for="username">Username:<input type="text" id="username" placeholder="Enter your name" name="username" required></label>
                </div>
                <div class="input-fields">
                    <label for="pswrd">Password:<input type="password" id="pswrd" placeholder="Enter password" name="password" required></label>
                </div>
                <div class="submit">
                    <input type="submit" class="submit" value="Login">
                </div>
            </form>
            <div class="redirect">
                <b>Don't have an account? Create account here</b>
                <br>
                <a href="/" class="login">signup</a>
            </div>
        </div>
    </div>
</body>
</html>
