{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="signup-container">
        <div class="signup-box">
            <form method="post">
                {% csrf_token %}
                <div class="heading">
                    <h2>Todo List Dashboard</h2>
                    <div class="user_name">Hello 👋 {{user}}</div>
                </div>
                <div class="input-fields">
                    <label for="task">Task:<input type="text" id="task" placeholder="Add today's task" name="title" value={{obj.title}} required></label>
                </div>
                <div class="submit">
                    <input type="submit" class="submit" value="ADD TASK">
                </div>
            </form>
            {% for task in res %}
            <div class="task">
                {{ task.title }}
                <a href="/edit/{{task.task_id}}"><i class="fa-solid fa-pen-to-square"></i></a>
                <a href=""><i class="fa-solid fa-trash"></i></a>
            </div>
            {% endfor%}
        </div>
    </div>
</body>
</html>
